# Configuration de base
listen=YES
listen_ipv6=NO
local_enable=YES
write_enable=YES
chroot_local_user=YES
allow_writeable_chroot=YES
# Désactive le bac à sable seccomp (indispensable sur Alpine/Docker)
seccomp_sandbox=NO
isolate_network=NO
# Désactive le mode détachable. Le processus reste au premier plan.
background=NO

# Droits d'écriture pour le groupe (nobody)
# umask 002 => Fichiers en 664, Dossiers en 775
local_umask=002

# Mode Passif pour Docker
# Obligatoire pour passer à travers le NAT de Docker
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110

# Sécurité SSL/TLS (Identique au niveau Nginx)
ssl_enable=YES
allow_anon_ssl=NO
force_local_data_ssl=YES
force_local_logins_ssl=YES
require_ssl_reuse=NO

# On force TLS (plus sécure que SSL v2/v3)
ssl_tlsv1=YES
ssl_sslv2=NO
ssl_sslv3=NO

# Chemins des certificats
rsa_cert_file=/etc/nginx/ssl/nginx.crt
rsa_private_key_file=/etc/nginx/ssl/nginx.key

# Logs
xferlog_enable=YES
vsftpd_log_file=/var/log/vsftpd.log